<div id="searchresult-root">
  <style>
    #searchresult-root {
      padding: 1rem;
    }

    #result-label {
      font-size: 1rem;
      font-weight: 600;
      color: darkslategrey;
      margin-bottom: 1rem;
      padding: 0 .25rem;
    }

    #result-label span {
      color: #FF6435;
    }

    #result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .gk-card {
      background: white;
      border: 1px solid #f0e8e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .gk-card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f0ee;
      overflow: hidden;
    }

    .gk-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .3s;
    }

    .gk-wish {
      position: absolute;
      top: .5rem;
      right: .5rem;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(4px);
      transition: transform .2s;
    }

    .gk-wish:active {
      transform: scale(1.25);
    }

    .gk-wish svg .heart-fill {
      fill: none;
      transition: fill .2s, stroke .2s;
    }

    .gk-wish.wished svg .heart-fill {
      fill: #FF6435;
      stroke: #FF6435;
    }

    .gk-card-info {
      padding: .6rem .7rem .8rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .gk-card-name {
      font-size: .85rem;
      font-weight: 600;
      color: darkslategrey;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gk-card-price {
      font-size: .9rem;
      font-weight: 700;
      color: #FF6435;
    }

    #result-loader {
      text-align: center;
      padding: 1.5rem;
      color: #aaa;
      font-size: .9rem;
    }

    #no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 1rem;
      display: none;
    }
  </style>

  <p id="result-label">Results for "<span id="result-query"></span>"</p>
  <div id="result-grid"></div>
  <div id="result-loader">Loading...</div>
  <div id="no-results">No results found.</div>
  
  
  
  

</div>
