<div id="searchresult-root">
  <style>
    #searchresult-root {
      padding: 1rem;
      padding-bottom: 5rem;
    }

    #result-label {
      font-size: 1rem;
      font-weight: 600;
      color: darkslategrey;
      margin-bottom: 1rem;
      padding: 0 .25rem;
    }

    #result-label span {
      color: #FF6435;
    }

    #result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .gk-card {
      background: white;
      border: 1px solid #f0e8e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .gk-card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f0ee;
      overflow: hidden;
    }

    .gk-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .3s;
    }

    .gk-wish {
      position: absolute;
      top: .5rem;
      right: .5rem;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(4px);
      transition: transform .2s;
    }

    .gk-wish:active { transform: scale(1.25); }

    .gk-wish svg .heart-fill {
      fill: none;
      transition: fill .2s, stroke .2s;
    }

    .gk-wish.wished svg .heart-fill {
      fill: #FF6435;
      stroke: #FF6435;
    }

    .gk-card-info {
      padding: .6rem .7rem .8rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .gk-card-name {
      font-size: .85rem;
      font-weight: 600;
      color: darkslategrey;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gk-card-price {
      font-size: .9rem;
      font-weight: 700;
      color: #FF6435;
    }

    #result-loader {
      text-align: center;
      padding: 1.5rem;
      color: #aaa;
      font-size: .9rem;
    }

    #no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 1rem;
      display: none;
    }

    /* --- Sort Bar --- */
    #sort-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 900;
      background: white;
      border-top: 1px solid #f0e8e8;
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    #sort-btn {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: none;
      border: 1.5px solid #FF6435;
      border-radius: 2rem;
      padding: .4rem 1rem;
      color: #FF6435;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
    }

    #sort-btn-icon {
      transition: transform .3s ease;
    }

    #sort-btn.open #sort-btn-icon {
      transform: rotate(180deg);
    }

    /* --- Sort Sheet --- */
    #sort-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 901;
      background: rgba(0,0,0,0.25);
    }

    #sort-overlay.open {
      display: block;
    }

    #sort-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 902;
      background: white;
      border-radius: 1.25rem 1.25rem 0 0;
      padding: 1.25rem 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform .35s ease;
    }

    #sort-sheet.open {
      transform: translateY(0);
    }

    #sort-sheet-title {
      font-size: .8rem;
      font-weight: 700;
      color: #aaa;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .sort-option {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem .5rem;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-size: .95rem;
      font-weight: 500;
      color: darkslategrey;
      cursor: pointer;
      border-radius: .5rem;
      transition: background .15s;
    }

    .sort-option:active { background: #fff0ec; }

    .sort-option.active {
      color: #FF6435;
      font-weight: 700;
    }

    .sort-option.active svg {
      stroke: #FF6435;
    }

    .sort-option svg {
      flex-shrink: 0;
      stroke: darkslategrey;
    }
  </style>

  <p id="result-label">Results for "<span id="result-query"></span>"</p>
  <div id="result-grid"></div>
  <div id="result-loader">Loading...</div>
  <div id="no-results">No results found.</div>

  <!-- Sort Bar -->
  <div id="sort-bar">
    <button id="sort-btn">
      <svg id="sort-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6435" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M7 12h10M11 18h2"/>
      </svg>
      Sort
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF6435" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>
  </div>

  <!-- Overlay -->
  <div id="sort-overlay"></div>

  <!-- Sort Sheet -->
  <div id="sort-sheet">
    <div id="sort-sheet-title">Sort by</div>

    <button class="sort-option active" data-sort="default">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
      Default
    </button>

    <button class="sort-option" data-sort="price-asc">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
      Price: Low to High
    </button>

    <button class="sort-option" data-sort="price-desc">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      Price: High to Low
    </button>

    <button class="sort-option" data-sort="az">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 6h8M4 12h6M4 18h4M16 6l4 12M20 6l-4 12"/>
      </svg>
      A to Z
    </button>

    <button class="sort-option" data-sort="za">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 6h4M4 12h6M4 18h8M16 18l4-12M20 18l-4-12"/>
      </svg>
      Z to A
    </button>
  </div>
</div>
