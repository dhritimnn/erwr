<div id="productcomp-root">
  <style>
    #productcomp-root {
      font-family: inherit;
      color: darkslategrey;
      z-index: 700;
    }
    
    /* ── IMAGE SLIDER ── */
    #pc-slider-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #f0ebe8;
      aspect-ratio: 3/4;
    }
    
    #pc-slider {
      display: flex;
      height: 100%;
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
      will-change: transform;
    }
    
    .pc-slide {
      min-width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }
    
    .pc-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    
    /* indicators */
    #pc-dots {
      position: absolute;
      bottom: .75rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: .4rem;
      z-index: 10;
    }
    
    .pc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .5);
      transition: background .2s, transform .2s;
    }
    
    .pc-dot.active {
      background: white;
      transform: scale(1.3);
    }
    
    /* ── LIGHTBOX ── */
    #pc-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .92);
      z-index: 9999;
      overflow: hidden;
      touch-action: none;
    }
    
    #pc-lightbox.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #pc-lb-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform-origin: center center;
      transition: transform .1s linear;
      will-change: transform;
      pointer-events: none;
      user-select: none;
    }
    
    #pc-lb-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, .15);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    /* ── PRODUCT INFO ── */
    #pc-info {
      padding: 1.25rem 1.1rem .5rem;
    }
    
    #pc-featured-tag {
      display: inline-block;
      background: #FF5400;
      color: white;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 2rem;
      margin-bottom: .6rem;
    }
    
    #pc-name {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 .3rem;
      line-height: 1.2;
    }
    
    #pc-cat {
      font-size: .82rem;
      color: #aaa;
      margin-bottom: .75rem;
      text-transform: capitalize;
    }
    
    #pc-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #FF5400;
      margin-bottom: 1.2rem;
    }
    
    /* ── BUTTONS ── */
    #pc-btns {
      padding: 0 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }
    
    .pc-wish-standalone {
      background: #ff8a6a;
    }
    
    .pc-wish-standalone.wished {
      background: #c0392b;
    }
    
    .pc-btn {
      width: 100%;
      padding: .85rem;
      border-radius: .6rem;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: opacity .15s;
    }
    
    .pc-btn:active {
      opacity: .8;
    }
    
    #pc-cart-btn {
      background: #FF5400;
      color: white;
    }
    
    #pc-cart-btn.added {
      background: #2e7d32;
    }
    
    #pc-wa-btn {
      background: #25D366;
      color: white;
    }
    
    /* ── SUGGESTIONS ── */
    #pc-suggestions {
      padding: 0 1.1rem 2rem;
    }
    
    #pc-suggestions h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: .85rem;
      color: darkslategrey;
    }
    
    #pc-sug-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    
    .gk-card {
      background: white;
      border: 1px solid #f0e8e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    
    .gk-card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f0ee;
      overflow: hidden;
    }
    
    .gk-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .gk-wish {
      position: absolute;
      top: .5rem;
      right: .5rem;
      background: rgba(255, 255, 255, .85);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      backdrop-filter: blur(4px);
      transition: transform .2s;
    }
    
    .gk-wish:active {
      transform: scale(1.25);
    }
    
    .gk-wish.wished svg path {
      fill: #FF5400;
      stroke: #FF5400;
    }
    
    .gk-card-info {
      padding: .6rem .7rem .8rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    
    .gk-card-name {
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .gk-card-price {
      font-size: .9rem;
      font-weight: 700;
      color: #FF5400;
    }
  </style>
  
  <!-- SLIDER -->
  <div id="pc-slider-wrap">
    <div id="pc-slider"></div>
    <div id="pc-dots"></div>
  </div>
  
  <!-- LIGHTBOX -->
  <div id="pc-lightbox">
    <button id="pc-lb-close">✕</button>
    <img id="pc-lb-img" src="" alt="">
  </div>
  
  <!-- INFO -->
  <div id="pc-info">
    <div id="pc-featured-tag" style="display:none">Featured</div>
    <h1 id="pc-name"></h1>
    <div id="pc-cat"></div>
    <div id="pc-price"></div>
  </div>
  
  <!-- BUTTONS -->
  <div id="pc-btns">
    <button id="pc-wish-btn" class="pc-btn pc-wish-standalone">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path class="heart-fill" d="M12 21C12 21 3 14.5 3 8.5A5 5 0 0 1 12 6.5 5 5 0 0 1 21 8.5C21 14.5 12 21 12 21Z" />
      </svg>
      Wishlist
    </button>
    <button id="pc-cart-btn" class="pc-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,1 4,1 4,16" />
        <polyline points="4,5 21,5 19,13 6,13" />
        <circle cx="9" cy="19" r="1.8" fill="white" stroke="none" />
        <circle cx="17" cy="19" r="1.8" fill="white" stroke="none" />
      </svg>
      Add to Cart
    </button>
    <button id="pc-wa-btn" class="pc-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
      </svg>
      Ask on WhatsApp
    </button>
  </div>
  
  <!-- SUGGESTIONS -->
  <div id="pc-suggestions">
    <h3>You may also like</h3>
    <div id="pc-sug-grid"></div>
  </div>
  
</div>
