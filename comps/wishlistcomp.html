<div id="wl-root">
  <style>
    #wl-root {
      padding: 1rem;
      min-height: 60vh;
      font-family: inherit;
      color: darkslategrey;
    }

    #wl-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    #wl-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
    }

    #wl-clear-btn {
      background: none;
      border: 1.5px solid #ffb3a0;
      color: #FF5400;
      font-size: .8rem;
      font-weight: 600;
      padding: .35rem .75rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    #wl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .wl-card {
      background: white;
      border: 1px solid #f0e8e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
    }

    .wl-card-img-wrap {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f0ee;
      overflow: hidden;
    }

    .wl-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .wl-remove {
      position: absolute;
      top: .45rem;
      right: .45rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,.45);
      border: none;
      color: white;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background .15s;
      padding: 0;
    }

    .wl-remove:active { background: rgba(255,84,0,.8); }

    .wl-card-info {
      padding: .55rem .65rem .7rem;
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }

    .wl-card-name {
      font-size: .82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wl-card-price {
      font-size: .88rem;
      font-weight: 700;
      color: #FF5400;
    }

    /* empty state */
    #wl-empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      gap: .75rem;
      color: #bbb;
    }

    #wl-empty svg { opacity: .35; }
    #wl-empty p { margin: 0; font-size: .95rem; }

    /* confirm overlay */
    #wl-confirm {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 9999;
      align-items: flex-end;
      justify-content: center;
    }

    #wl-confirm.open { display: flex; }

    #wl-confirm-sheet {
      background: white;
      width: 100%;
      border-radius: 1.25rem 1.25rem 0 0;
      padding: 1.75rem 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: slideUp .25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    #wl-confirm-sheet h3 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: darkslategrey;
    }

    #wl-confirm-sheet p {
      margin: 0;
      font-size: .9rem;
      color: #888;
    }

    #wl-confirm-yes {
      background: #FF5400;
      color: white;
      border: none;
      border-radius: .6rem;
      padding: .85rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    #wl-confirm-no {
      background: #f5f0ee;
      color: darkslategrey;
      border: none;
      border-radius: .6rem;
      padding: .85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>

  <div id="wl-header">
    <h2>My Wishlist</h2>
    <button id="wl-clear-btn">Clear all</button>
  </div>

  <div id="wl-grid"></div>

  <div id="wl-empty">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#FF5400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 21C12 21 3 14.5 3 8.5A5 5 0 0 1 12 6.5 5 5 0 0 1 21 8.5C21 14.5 12 21 12 21Z"/>
    </svg>
    <p>Your wishlist is empty.</p>
  </div>

  <!-- confirm sheet -->
  <div id="wl-confirm">
    <div id="wl-confirm-sheet">
      <h3>Clear wishlist?</h3>
      <p>All saved items will be removed. This can't be undone.</p>
      <button id="wl-confirm-yes">Yes, clear it</button>
      <button id="wl-confirm-no">Cancel</button>
    </div>
  </div>

 
</div>
